<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Taskboard (Local)</title>
  <link rel="stylesheet" href="./taskboard.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="title">Taskboard</div>
      <div class="subtitle">Local Kanban • .taskboard/ (NDJSON)</div>
    </div>

    <div class="actions">
      <div class="filterGroup" id="filterGroup">
        <button class="filterBtn active" data-filter="all">All</button>
        <button class="filterBtn" data-filter="P1">P1</button>
        <button class="filterBtn" data-filter="P2">P2</button>
        <button class="filterBtn" data-filter="P3">P3</button>
      </div>
      <button id="btnOpen" class="btn">Open Project Folder</button>
      <button id="btnInit" class="btn btnPrimary">Initialize .taskboard</button>
      <button id="btnAdd" class="btn" disabled>Add Task</button>
      <button id="btnReload" class="btn" disabled>Reload</button>
      <button id="btnTheme" class="btn">Theme</button>
      <span id="status" class="status">Not connected</span>
    </div>
  </header>

  <main class="main">
    <section id="board" class="board" aria-label="Kanban Board"></section>
  </main>

  <template id="tplColumn">
    <div class="column" data-column-id="">
      <div class="columnHeader">
        <div class="columnTitle"></div>
        <div class="columnMeta"></div>
      </div>
      <div class="dropzone" data-dropzone=""></div>
    </div>
  </template>

  <template id="tplCard">
    <article class="card" draggable="true" data-task-id="">
      <div class="cardTop">
        <div class="cardTitle"></div>
        <div class="priorityBadge"></div>
        <div class="pill"></div>
      </div>

      <div class="checklist"></div>

      <div class="cardFooter">
        <button class="miniBtn" data-action="add-check">+ Check</button>
        <button class="miniBtn" data-action="priority">Priority</button>
        <button class="miniBtn" data-action="rename">Rename</button>
        <button class="miniBtn danger" data-action="delete">Delete</button>
      </div>
    </article>
  </template>

  <dialog id="dlgTask" class="modal">
    <form method="dialog" id="frmTask">
      <div class="modalHeader">
        <h3 id="dlgTitle">New Task</h3>
      </div>
      <div class="modalBody">
        <div class="formGroup">
          <label for="taskTitle">Title</label>
          <input type="text" id="taskTitle" name="title" placeholder="What needs to be done?" required autofocus />
        </div>
        <div class="formRow">
          <div class="formGroup">
            <label for="taskPriority">Priority</label>
            <select id="taskPriority" name="priority">
              <option value="P1">P1 (High)</option>
              <option value="P2" selected>P2 (Normal)</option>
              <option value="P3">P3 (Low)</option>
            </select>
          </div>
          <div class="formGroup">
            <label for="taskColumn">Column</label>
            <select id="taskColumn" name="column">
              <!-- Dynamically populated -->
            </select>
          </div>
        </div>
        <div class="formGroup">
          <label for="taskDescription">Description (Optional)</label>
          <textarea id="taskDescription" name="description" rows="3" placeholder="Add more details..."></textarea>
        </div>
      </div>
      <div class="modalFooter">
        <button type="button" id="btnCancelTask" class="btn">Cancel</button>
        <button type="submit" class="btn btnPrimary">Save Task</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="./taskboard.js"></script>
</body>
</html>
